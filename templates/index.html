<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Based Water Crisis Risk Prediction</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#eaf4fc;
        }

        .container{
            width:420px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0077b6;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:15px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:16px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:12px;
            background:#0077b6;
            color:white;
            border:none;
            border-radius:6px;
            font-size:17px;
            cursor:pointer;
        }

        button:hover{
            background:#005f8d;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:green;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>AI Based Water Crisis Risk Prediction</h1>

    <form action="/predict" method="POST">

        <label>Rainfall (mm)</label>
        <input
            type="number"
            name="rainfall"
            placeholder="Enter Rainfall"
            min="0"
            step="0.01"
            required
        >

        <label>Population</label>
        <input
            type="number"
            name="population"
            placeholder="Enter Population"
            min="0"
            step="1"
            required
        >

        <label>Groundwater Level</label>
        <input
            type="number"
            name="groundwater"
            placeholder="Enter Groundwater Level"
            min="0"
            step="0.01"
            required
        >

        <button type="submit">Predict Risk</button>

    </form>

    {% if prediction %}
    <div class="result">
        {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
