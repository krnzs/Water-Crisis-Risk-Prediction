<!DOCTYPE html>
<html>
<head>
    <title>AI Based Water Crisis Risk Prediction</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:auto;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        h3{
            color:blue;
        }
    </style>
</head>

<body>

<div class="container">

<h2>AI Based Water Crisis Risk Prediction System</h2>

<form action="/predict" method="post">

    <input type="number"
           step="any"
           name="rainfall"
           placeholder="Enter Rainfall"
           required>

    <input type="number"
           step="any"
           name="population"
           placeholder="Enter Population"
           required>

    <input type="number"
           step="any"
           name="groundwater"
           placeholder="Enter Groundwater"
           required>

    <button type="submit">
        Predict
    </button>

</form>

{% if prediction %}
<h3>{{ prediction }}</h3>
{% endif %}

</div>

</body>
</html>
